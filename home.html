<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100">

<!-- Navbar -->

<nav class="flex justify-between items-center p-4 bg-white shadow">

<div class="flex items-center gap-2 text-xl font-semibold">
<img src="assets/github-logo2.png" width="30">
GitHub Issues Tracker
</div>

<div class="flex gap-3 items-center">

<div class="relative">

<i onclick="searchIssue()"
class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer"></i>

<input
id="searchInput"
class="text-base border w-80 py-2 pl-10 pr-3 rounded-lg"
placeholder="Search issues..."
>

</div>

<button  onclick="searchIssue()" class="bg-[#4A00FF] text-white px-5 py-3 rounded-lg">
search
</button>

</div>

</nav>

<!-- Tabs -->

<div class="container w-[90%] mx-auto">

<div class="tabs bg-white mt-10 rounded-lg p-2">

<button onclick="loadIssues('all')" id="allTab" class="active">All</button>
<button onclick="loadIssues('open')" id="openTab">Open</button>
<button onclick="loadIssues('closed')" id="closedTab">Closed</button>

</div>

<!-- Header -->

<div class="bg-white mt-4 rounded-lg p-5 flex justify-between items-center">

<div class="flex gap-3 items-center">

<img src="assets/Aperture.png" width="30">

<div>
<h3 id="issueCount">0 Issues</h3>
<p class="text-sm text-gray-500">Track and manage your project issues</p>
</div>

</div>

<div>
<span class="text-[#000]"><span class="text-[#00A96E]">●</span> Open</span>
<span class="text-[#000]"><span class="text-[#A855F7]">●</span> Closed</span>
</div>

</div>

<!-- Issues -->

<div id="issuesContainer" class="grid md:grid-cols-3 gap-4 mt-5"></div>

<!-- Loading -->

<div id="loading" class="hidden text-center mt-10">
Loading...
</div>

</div>

<!-- Modal -->

<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-8 pb-[80px] rounded-xl w-[650px] relative">

<h2 id="modalTitle" class="text-3xl font-bold mb-3"></h2>

<div class="flex items-center gap-3 text-sm mb-5">

<span class="bg-green-500 text-white px-3 py-1 rounded-full text-xs">
<span id="modalStatus"></span>
</span>

<span class="text-gray-500">
Opened by <b id="modalAuthor"></b>
</span>

<span class="text-gray-400" id="modalcreatedAt"></span>

</div>

<!-- labels -->
<div id="modalLabels" class="flex gap-2 mb-5"></div>

<p id="modalDescription" class="text-gray-600 mb-6"></p>

<div class="bg-gray-100 rounded-lg p-5 flex justify-between">

<div>
<p class="text-gray-500 text-sm">Assignee:</p>
<p id="modalAuthor2" class="font-semibold"></p>
</div>

<div>
<p class="text-gray-500 text-sm">Priority:</p>
<span id="modalPriority"
class="bg-red-500 text-white px-3 py-1 rounded-full text-xs"></span>
</div>

</div>

<button onclick="closeModal()"
class="absolute bottom-8 right-8 bg-[#4A00FF] text-white px-6 py-2 rounded-lg cursor-pointer">
Close
</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
